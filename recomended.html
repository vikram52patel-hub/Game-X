<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recommended — GAME X</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <style>
      body {
        min-height: 100vh;
      }

      h1 {
        color: #0f0;
        text-shadow: 0 0 12px #0f0;
        text-align: center;
        margin: 2rem 0 0.4rem;
        font-size: 2.2rem;
        letter-spacing: 2px;
      }

      .subtitle {
        text-align: center;
        color: #555;
        margin-bottom: 2.5rem;
        font-size: 0.9rem;
        letter-spacing: 1px;
      }

      /* Card */
      .rec-card {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 12px;
        box-shadow: 0 0 30px rgba(0, 255, 0, 0.05);
        padding: 2.5rem;
        max-width: 640px;
        margin: 0 auto 4rem;
      }

      /* Labels */
      .form-label {
        color: #0f0;
        font-size: 0.85rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 0.3rem;
      }

      /* Inputs */
      .form-control,
      .form-select {
        background-color: #0d0d0d;
        border: 1px solid #2a2a2a;
        color: #eee;
        border-radius: 8px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .form-control:focus,
      .form-select:focus {
        background-color: #0d0d0d;
        border-color: #0f0;
        box-shadow: 0 0 0 2px rgba(0, 255, 0, 0.2);
        color: #eee;
      }
      .form-control::placeholder { color: #444; }

      /* Radio / check */
      .form-check-input:checked {
        background-color: #0f0;
        border-color: #0f0;
      }
      .form-check-label { color: #aaa; }

      /* Star rating */
      .star-row { display: flex; gap: 8px; flex-direction: row-reverse; justify-content: flex-end; }
      .star-row input { display: none; }
      .star-row label {
        font-size: 1.6rem; color: #333; cursor: pointer;
        transition: color 0.15s;
      }
      .star-row input:checked ~ label,
      .star-row label:hover,
      .star-row label:hover ~ label { color: #0f0; }

      /* Submit button */
      .btn-gx {
        background: transparent;
        color: #0f0;
        border: 1px solid #0f0;
        border-radius: 8px;
        padding: 0.6rem 2rem;
        font-family: "Courier New", monospace;
        letter-spacing: 1px;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        width: 100%;
      }
      .btn-gx:hover {
        background: #0f0;
        color: #000;
        box-shadow: 0 0 18px rgba(0, 255, 0, 0.45);
      }

      /* Success alert */
      .alert-success-gx {
        background: rgba(0,255,0,0.08);
        border: 1px solid #0f0;
        color: #0f0;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>

  <body>
    <!-- ── Navbar ─────────────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand shatter-link" href="index.html">GAME X</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link shatter-link" href="index.html">computers</a>
            </li>
            <li class="nav-item">
              <a class="nav-link shatter-link" href="gaming chairs.html">gaming chairs</a>
            </li>
            <li class="nav-item">
              <a class="nav-link shatter-link" href="rgb lights.html">rgb lights</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
              >
                other things
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item shatter-link" href="trending.html">trending</a></li>
                <li><a class="dropdown-item shatter-link active" href="recomended.html">recommended</a></li>
                <li><a class="dropdown-item shatter-link" href="killswitch.html">kill</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ── Page heading ──────────────────────────────────── -->
    <h1>RECOMMENDED</h1>
    <p class="subtitle">// tell us what you think &amp; get personalised picks</p>

    <!-- ── Form card ─────────────────────────────────────── -->
    <div class="container">
      <div class="rec-card">

        <!-- Success message -->
        <div class="alert alert-success-gx mb-4" id="successMsg" role="alert">
          ✔ Submission received — we'll reach out soon.
        </div>

        <form id="recForm" novalidate>

          <!-- Row 1: Name + Phone -->
          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label class="form-label" for="rec-name">Your Name</label>
              <input
                id="rec-name"
                name="name"
                type="text"
                class="form-control"
                placeholder="John Doe"
                required
              />
            </div>
            <div class="col-sm-6">
              <label class="form-label" for="rec-phone">Phone Number</label>
              <input
                id="rec-phone"
                name="phone"
                type="tel"
                class="form-control"
                placeholder="+1 234 567 8900"
              />
            </div>
          </div>

          <!-- Row 2: Email -->
          <div class="mb-3">
            <label class="form-label" for="rec-email">Email Address</label>
            <input
              id="rec-email"
              name="email"
              type="email"
              class="form-control"
              placeholder="you@example.com"
              required
            />
          </div>

          <!-- Row 3: Product interest -->
          <div class="mb-3">
            <label class="form-label" for="rec-category">Interested In</label>
            <select id="rec-category" name="category" class="form-select">
              <option value="" selected disabled>Choose a category…</option>
              <option value="computers">Computers</option>
              <option value="chairs">Gaming Chairs</option>
              <option value="lights">RGB Lights</option>
              <option value="bundle">Full Bundle</option>
            </select>
          </div>

          <!-- Row 4: Budget radio -->
          <div class="mb-3">
            <label class="form-label d-block">Budget Range</label>
            <div class="row g-2">
              <div class="col-auto">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="budget" id="bud1" value="under50" />
                  <label class="form-check-label" for="bud1">Under $50</label>
                </div>
              </div>
              <div class="col-auto">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="budget" id="bud2" value="50-200" />
                  <label class="form-check-label" for="bud2">$50 – $200</label>
                </div>
              </div>
              <div class="col-auto">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="budget" id="bud3" value="200plus" />
                  <label class="form-check-label" for="bud3">$200+</label>
                </div>
              </div>
            </div>
          </div>

          <!-- Row 5: Star rating -->
          <div class="mb-3">
            <label class="form-label d-block">Rate Your Experience</label>
            <div class="star-row" id="starRow">
              <input type="radio" id="s5" name="rating" value="5" /><label for="s5">★</label>
              <input type="radio" id="s4" name="rating" value="4" /><label for="s4">★</label>
              <input type="radio" id="s3" name="rating" value="3" /><label for="s3">★</label>
              <input type="radio" id="s2" name="rating" value="2" /><label for="s2">★</label>
              <input type="radio" id="s1" name="rating" value="1" /><label for="s1">★</label>
            </div>
          </div>

          <!-- Row 6: Comments -->
          <div class="mb-4">
            <label class="form-label" for="rec-comments">Comments / Recommendations</label>
            <textarea
              id="rec-comments"
              name="comments"
              class="form-control"
              rows="4"
              placeholder="Tell us what you'd like to see, or any feedback…"
            ></textarea>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-gx">SUBMIT →</button>

        </form>
      </div>
    </div>

    <!-- ── Form submit handler ───────────────────────────── -->
    <script>
      document.getElementById("recForm").addEventListener("submit", function (e) {
        e.preventDefault();
        this.style.opacity = "0.4";
        setTimeout(function () {
          document.getElementById("recForm").style.opacity = "1";
          document.getElementById("successMsg").style.display = "block";
          document.getElementById("recForm").reset();
        }, 600);
      });
    </script>

    <!-- Shatter Animation -->
    <script src="shatter.js"></script>
  </body>
</html>
